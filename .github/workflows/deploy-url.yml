name: deploy-url

# Triggers on changes to the URL service or shared code.
# Uses AWS OIDC for keyless auth → build image → push to ECR (unique SHA tag) →
# register new task definition revision → rolling ECS deployment.
# ECR tag immutability is ENABLED — no floating 'latest' tag.
on:
  push:
    branches: [main]
    paths:
      - "app/url/**"
      - "app/common/**"
      - ".github/workflows/deploy-url.yml"
  workflow_dispatch: {}

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: eu-west-2
  ECR_REPO: mlscan-models
  BASE_TAG: base-url-20250301        # current ML model base image version
  CLUSTER: mlscan-cluster
  SERVICE: url-svc
  TASK_FAMILY: url-task

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<YOUR_ACCOUNT_ID>:role/gha-mlscan-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          BASE_IMAGE="$REGISTRY/$ECR_REPO:$BASE_TAG"
          SHA_TAG="url-${GITHUB_SHA::12}-${GITHUB_RUN_NUMBER}"
          docker build \
            --progress=plain \
            --build-arg BASE_IMAGE="$BASE_IMAGE" \
            -t "$REGISTRY/$ECR_REPO:$SHA_TAG" \
            -f app/url/Dockerfile app
          docker push "$REGISTRY/$ECR_REPO:$SHA_TAG"
          echo "IMAGE=$REGISTRY/$ECR_REPO:$SHA_TAG" >> "$GITHUB_ENV"

      - name: Register new task definition & deploy
        run: |
          set -euo pipefail
          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" --region "$AWS_REGION" \
            --query 'taskDefinition' --output json | \
            python3 -c "
          import sys, json
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if c['name'] == 'app':
                  c['image'] = '$IMAGE'
          for f in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'placementConstraints','compatibilities','registeredAt','registeredBy']:
              td.pop(f, None)
          print(json.dumps(td))
          ")
          NEW_ARN=$(aws ecs register-task-definition \
            --region "$AWS_REGION" \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "New task definition: $NEW_ARN"
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_ARN" \
            --region "$AWS_REGION"
          aws ecs wait services-stable \
            --cluster "$CLUSTER" --services "$SERVICE" --region "$AWS_REGION" || \
            echo "wait timed out — deployment still in progress, check ECS console"
